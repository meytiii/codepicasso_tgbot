name: Update Market Prices

on:
  schedule:
    - cron: '*/15 * * * *' # Runs automatically every 15 minutes
  workflow_dispatch: # Adds a button so you can run it manually anytime

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run scraper script
      run: python app.py

    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Safely add the data folder (if it exists) without crashing
        git add data/ || echo "No data folder to add"
        
        # Commit and push only if there are changes
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update market prices" && git push)